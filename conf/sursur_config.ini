# ======================================================================
# ARAÑA OSINT SUR-SUR - CONFIGURACIÓN DE NODO (sursur_config.ini)
# ======================================================================

[Network]
# Parámetros del motor BFS (Breadth-First Search) y libcurl
max_jumps=3
timeout_ms=5000
user_agent_rotation=true
# Activación estricta del Filtro Hermenéutico Sur-Sur (Axioma Cero)
# Descarta automáticamente conexiones a dominios del Norte Global hegemónico
strict_sur_sur_filter=true

[Sources]
# Rutas a los listados de extracción
rss_seeds_file=/etc/sursur/seeds_arsenal_soberania.txt
# Integración de plataformas comerciales, alt-tech y descentralizadas
streaming_services=youtube,telegram,vk,peertube,odysee,rumble
target_keywords="decolonialidad, teoría cyborg, trans lesbianas, asexualidad, magíster de género, pensamiento angoleño, inteligencia artificial local, permacultura, medicina del jaguar, saberes ancestrales, trastornos disociativos, soberanía tecnológica, vaginoplastia, silicona industrial, subcontratación, precariedad laboral, multipolaridad, desdolarización, BRICS, hegemonía occidental, OTAN, imperialismo financiero"

[LLM]
# Configuración de inferencia local (llama.cpp)
# Modelo recomendado: Meta-Llama-3-8B-Instruct Q4_K_M (~4.8GB RAM)
# Alternativa multilingüe: Mistral-Nemo-Instruct-2407-Q4_K_M (~7.1GB RAM)
model_path=/var/lib/sursur/models/Meta-Llama-3-8B-Instruct-Q4_K_M.gguf
context_window=8192
llm_context_size=8192
llm_batch_size=4096
system_prompt_template=/etc/sursur/prompts/base_evaluator.txt
# Hilos de inferencia = Núcleos FÍsicos del Ryzen 9 (NO lógicos)
# Ryzen 9 5900X = 12, Ryzen 9 7950X = 16
inference_threads=12
# GPU layers (0 = CPU-only hasta resolver compilación CUDA)
gpu_layers=0
# Fuerza al LLM a emitir JSON para el procesamiento automatizado en C++
enforce_json_output=true

[User_Profile]
# ======================================================================
# INYECCIÓN DINÁMICA DE PERFIL: "El Curador v12.0"
# Estos parámetros reemplazan las variables {{VARIABLE}} en el prompt base
# ======================================================================

# Perfil del Sujeto (Axiomas de Identidad y Cognición)
profile_description="Mujer trans afroindígena sudamericana. Perfil de Altas Capacidades y neurodivergencia (TEA-I, TDAH, TEPT-C). Requiere curación orientada a la soberanía cognitiva, explícita, densa y neurodivergent-affirming. Consumo enfocado en herramientas de diagnóstico sistémico y praxis crítica."

# Marco Teórico Aplicado (El Porqué)
theoretical_frameworks="Crítica del Poder y Biopolítica (Sara Ahmed), Análisis del Trauma y Hantología (van der Kolk, Mark Fisher), Praxis Decolonial y Cimarronaje (Rivera Cusicanqui), Teoría Cyborg, Disidencia Sexual."

# Jerarquía Axiomática Calibrada (Reglas de Filtrado y Preferencia)
custom_axioms="1. Propulsión: Exige densidad narrativa y eficiencia (rechazo absoluto a lo simplista/hegemónico). 2. Subversión: Deconstrucción activa del formato. 3. Rigor: Tono adulto y consistencia lógica rigurosa. 4. Memoria: Narrativas de trauma tratadas como deconstrucción estructural. 5. Disidencia: Foco en disidencias femeninas y la 'familia encontrada'. 6. Energía Vital (Ashé): Prioridad a la textura cruda y soberanía cultural frente a la sobreproducción occidental y melancolía estetizada."

[Languages]
# Lenguas de extracción y análisis semántico (Occidentales, Orientales y Originarias)
target_langs=en,es,fr,ht,pt-BR,ar,qu,kun,kakan,ata
subtitle_output_lang=es
system_lang=es

[GraphDB]
sqlite_path=/var/lib/sursur/db/graph.db
database=sursur

[Media]
output_dir=/var/lib/sursur/media
default_audio_format=opus
ffmpeg_path=/usr/bin/ffmpeg
audio_bitrate=128
subtitle_format=vtt
yt_dlp_path=/usr/bin/yt-dlp
max_filesize_mb=100
max_resolution=720p

[Academic]
verify_orcid=true
verify_google_scholar=true
citation_format=APA7
pdf_corpus_dir=/var/lib/sursur/corpus

[Interface]
# Configuración del servidor HTTP embebido para Feedback y RSS
# Si está habilitado, sirve el feed RSS y archivos multimedia
http_server_enabled=true
# Puerto fijo (recomendado: 1973 por el año de la resistencia)
http_port=1973
# Dirección de escucha (0.0.0.0 para acceso desde el host en WSL2)
http_bind_address=0.0.0.0
