name: sursur

services:
  daemon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sursur-daemon
    restart: unless-stopped
    ports:
      - "1973:1973"
    volumes:
      # Persistent SQLite database
      - sursur-db:/var/lib/sursur/db
      # Downloaded/transcoded media
      - sursur-media:/var/lib/sursur/media
      # Bind-mount config for easy editing without rebuild
      - ./sursur_config.json:/etc/sursur/sursur_config.json:ro
    environment:
      # Point to the ollama_central container on the ai_network
      - OLLAMA_HOST=http://ollama_central:11434
    # Connect to the external ollama network
    networks:
      - sursur-net
      - ai_network

volumes:
  sursur-db:
  sursur-media:


networks:
  sursur-net:
    driver: bridge
  ai_network:
    external: true
